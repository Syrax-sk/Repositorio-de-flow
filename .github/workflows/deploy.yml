name: Deploy para Sistema Leidy

on:
  workflow_run:
    workflows: ["Deploy - StreamFlow"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      actions: read   # 👈 ESTA LÍNEA ES CLAVE 🔥
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Descargar artifact del workflow anterior
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: Deploy - StreamFlow
          run_id: ${{ github.event.workflow_run.id }}
          name: build
          path: dist

      - name: Verificar contenido descargado
        run: ls -la dist   # 👈 DEBUG útil (puedes quitarlo luego)

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Subir artefactos a Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Mostrar URL del sitio
        run: 'echo "Sitio en producción: ${{ steps.deployment.outputs.page_url }}"'