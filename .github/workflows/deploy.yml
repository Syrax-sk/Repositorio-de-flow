name: Deploy para Sistema Leidy

on:
  workflow_run:
    workflows: ["Deploy - StreamFlow"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Descargar artifact del build
        uses: actions/download-artifact@v4
        with:
          name: build
          path: dist
          run-id: ${{ github.event.workflow_run.id }}

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Subir artefactos a Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      
      - name: Mostrar URL del sitio
        run: echo "Sitio en producción: ${{ steps.deployment.outputs.page_url }}"