name: Deploy - StreamFlow

on:
  push:
    branches:
      - main

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Build y generar artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar pruebas
        run: npm test

      - name: (Opcional) Ejecutar build
        run: npm run build

      - name: Verificar archivos del proyecto
        run: |
          echo "Contenido del proyecto:"
          ls -la

      - name: Subir artifact del proyecto
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: .