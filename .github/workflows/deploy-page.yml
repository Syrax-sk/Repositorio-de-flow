name: Deploy - StreamFlow

on:
  push:
    branches:
      - main

permissions:
  contents: read
  deployments: write

jobs:
  test:
    name: Ejecutar Pruebas (antes de deploy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar pruebas
        run: npm test

  deploy:
    name: Construir aplicación
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar pruebas (doble verificación)
        run: npm test

      - name: Construir la aplicación
        run: npm run build

      - name: Mostrar información de versión
        run: |
          echo "🚀 Iniciando build de StreamFlow"
          echo "📦 Versión: $(node -p 'require(\"./package.json\").version')"
          echo "🌿 Rama: ${GITHUB_REF#refs/heads/}"
          echo "🔍 Commit: ${GITHUB_SHA:0:7}"

      - name: Guardar build como artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist
