name: Deploy para Sistema Leidy

on:
  workflow_run:
    workflows: ["Deploy - StreamFlow"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Descargar artifact del build
        uses: actions/download-artifact@v4
        with:
          name: build
          path: dist

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Subir a GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Mostrar URL
        run: |
          echo "🌐 Sitio en produccion: ${{ steps.deployment.outputs.page_url }}"